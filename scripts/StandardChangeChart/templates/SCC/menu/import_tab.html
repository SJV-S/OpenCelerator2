<div class="chart-menu-tab-inner import-tab-container">
    <!-- State 1: Drop Zone (initial) - entire panel is dropzone -->
    <div id="import-dropzone-state" class="import-state">
        <div id="import-dropzone" class="import-dropzone">
            <input type="file" id="import-file-input" accept=".csv,.xlsx,.xls,.ods" class="import-file-input-hidden">
            <div class="import-dropzone-content">
                <svg class="import-dropzone-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="17 8 12 3 7 8"/>
                    <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
                <p class="import-dropzone-text">Drop data file or click to browse</p>
                <p class="import-dropzone-formats">CSV, Excel, ODS</p>
            </div>
        </div>
    </div>

    <!-- State 2: Column Mapping -->
    <div id="import-mapping-state" class="import-state" style="display: none;">
        <div class="import-mapping-container">
            <p id="import-file-info" class="import-file-info"></p>

            <div class="import-mapping-fields" id="import-mapping-fields">
                <!-- Date Column (required) -->
                <div class="import-mapping-row">
                    <label class="import-mapping-label">Date <span class="import-required">*</span></label>
                    <select id="import-map-date" class="import-mapping-select">
                        <option value="">Select</option>
                    </select>
                </div>

                <!-- Corrects Column -->
                <div class="import-mapping-row">
                    <label class="import-mapping-label">Corrects</label>
                    <select id="import-map-corrects" class="import-mapping-select">
                        <option value="">Select</option>
                    </select>
                </div>

                <!-- Errors Column -->
                <div class="import-mapping-row">
                    <label class="import-mapping-label">Errors</label>
                    <select id="import-map-errors" class="import-mapping-select">
                        <option value="">Select</option>
                    </select>
                </div>

                <!-- Timing Column (only shown for minute charts, required when shown) -->
                <div class="import-mapping-row" id="import-timing-row">
                    <label class="import-mapping-label">Minutes <span class="import-required">*</span></label>
                    <select id="import-map-timing" class="import-mapping-select">
                        <option value="">Select</option>
                    </select>
                </div>

                <!-- Misc columns container -->
                <div id="import-misc-container"></div>

                <!-- Add misc button -->
                <button type="button" id="import-add-misc-btn" class="import-add-misc-btn">
                    + Add column
                </button>
            </div>

            <!-- Replace data option (only shown when data exists) -->
            <div id="import-replace-option" class="import-replace-option" style="display: none;">
                <label class="import-checkbox-label">
                    <input type="checkbox" id="import-replace-checkbox" checked>
                    <span>Replace existing data</span>
                </label>
            </div>

            <!-- Action buttons -->
            <div class="import-mapping-actions">
                <button id="import-cancel-btn" class="import-btn import-btn-secondary">
                    Cancel
                </button>
                <button id="import-confirm-btn" class="import-btn import-btn-primary" disabled>
                    Import
                </button>
            </div>
        </div>
    </div>

    <!-- State 3: Importing (progress) -->
    <div id="import-progress-state" class="import-state" style="display: none;">
        <div class="import-progress-container">
            <div class="import-progress-spinner"></div>
            <p class="import-progress-text">Importing...</p>
        </div>
    </div>
</div>
