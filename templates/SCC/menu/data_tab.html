<!-- Sub-tabs: New | Previous -->
<div class="data-subtabs">
    <button class="chart-menu-tab-btn active" data-subtab="new">New</button>
    <button class="chart-menu-tab-btn" data-subtab="previous">Previous</button>
</div>

<div class="chart-menu-tab-inner">
    <!-- Shared Plot Date Selection -->
    <div class="mb-4 lg:mb-3">
        <label class="block text-sm font-semibold text-gray-600 mb-2 lg:mb-1 text-center" for="entry-date">Plot Date</label>
        <div class="flex items-center gap-2">
            <button type="button" data-action="adjust-date" data-offset="-1" class="px-3 py-3 lg:px-2 lg:py-2 text-lg font-bold text-black border-2 border-gray-300 rounded hover:bg-gray-100 active:bg-gray-200 transition-colors flex items-center justify-center">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 4L6 10L12 16" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <div id="entry-date" class="flex-1 px-3 py-3 lg:px-2 lg:py-2 text-lg lg:text-base border-2 border-gray-300 rounded text-center cursor-default select-none"></div>
            <button type="button" data-action="adjust-date" data-offset="1" class="px-3 py-3 lg:px-2 lg:py-2 text-lg font-bold text-black border-2 border-gray-300 rounded hover:bg-gray-100 active:bg-gray-200 transition-colors flex items-center justify-center">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M8 4L14 10L8 16" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- New Entry Sub-pane -->
    <div id="new-subpane" class="data-subpane active">
        <div class="mb-6 lg:mb-3 grid grid-cols-2 gap-4 lg:gap-2">
            <div>
                <label id="corrects-series-label" class="block text-sm font-semibold text-gray-600 mb-2 lg:mb-1 text-center" for="corrects">Corrects</label>
                <input type="text" inputmode="numeric" pattern="[0-9]*" id="corrects" class="w-full px-3 py-3 lg:px-2 lg:py-2 text-lg lg:text-base border-2 border-gray-300 rounded focus:outline-none transition-colors text-center" placeholder="">
            </div>
            <div>
                <label id="errors-series-label" class="block text-sm font-semibold text-gray-600 mb-2 lg:mb-1 text-center" for="incorrects">Incorrects</label>
                <input type="text" inputmode="numeric" pattern="[0-9]*" id="incorrects" class="w-full px-3 py-3 lg:px-2 lg:py-2 text-lg lg:text-base border-2 border-gray-300 rounded focus:outline-none transition-colors text-center" placeholder="">
            </div>
        </div>

        <!-- Dynamic misc series inputs - generated by dataEntry.js -->
        <div id="misc-inputs-container" class="mb-6 lg:mb-3 grid grid-cols-2 gap-4 lg:gap-2"></div>

        <div class="mb-6 lg:mb-3">
            <label id="timing-series-label" class="block text-sm font-semibold text-gray-600 mb-2 lg:mb-1 text-center">Timing</label>
            <div class="grid grid-cols-3 gap-4 lg:gap-2">
                <div>
                    <label class="block text-xs text-gray-500 mb-1 text-center" for="hours">Hour</label>
                    <input type="text" inputmode="numeric" pattern="[0-9]*" id="hours" class="w-full px-2 py-3 lg:py-2 text-lg lg:text-base border-2 border-gray-300 rounded focus:outline-none transition-colors text-center" placeholder="">
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1 text-center" for="minutes">Min</label>
                    <input type="text" inputmode="numeric" pattern="[0-9]*" id="minutes" class="w-full px-2 py-3 lg:py-2 text-lg lg:text-base border-2 border-gray-300 rounded focus:outline-none transition-colors text-center" placeholder="">
                </div>
                <div>
                    <label class="block text-xs text-gray-500 mb-1 text-center" for="seconds">Sec</label>
                    <input type="text" inputmode="numeric" pattern="[0-9]*" id="seconds" class="w-full px-2 py-3 lg:py-2 text-lg lg:text-base border-2 border-gray-300 rounded focus:outline-none transition-colors text-center" placeholder="">
                </div>
            </div>
        </div>

        <div class="mt-3 lg:mt-2">
            <button class="w-full py-4 lg:py-2 text-lg lg:text-base font-bold text-white rounded hover:opacity-90 active:opacity-80 transition-colors bg-[#6ad1e3]" data-action="submit-entry">Submit</button>
        </div>
    </div>

    <!-- Previous Entry Sub-pane -->
    <div id="previous-subpane" class="data-subpane">
        <!-- Timestamp Selector -->
        <div class="mb-6 lg:mb-4" id="timestamp-selector-container" style="display: none;">
            <label class="block text-sm font-semibold text-gray-600 mb-2 text-center">Time</label>
            <div class="flex items-center gap-2">
                <button type="button" data-action="adjust-timestamp" data-offset="-1" class="px-3 py-3 lg:px-2 lg:py-2 text-lg font-bold text-black border-2 border-gray-300 rounded hover:bg-gray-100 active:bg-gray-200 transition-colors flex items-center justify-center">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 4L6 10L12 16" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <div id="current-timestamp-display" class="flex-1 px-3 py-3 lg:px-2 lg:py-2 text-lg lg:text-base border-2 border-gray-300 rounded text-center bg-gray-50"></div>
                <button type="button" data-action="adjust-timestamp" data-offset="1" class="px-3 py-3 lg:px-2 lg:py-2 text-lg font-bold text-black border-2 border-gray-300 rounded hover:bg-gray-100 active:bg-gray-200 transition-colors flex items-center justify-center">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M8 4L14 10L8 16" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Data Entry Block -->
        <div id="data-entry-block">
            <div class="px-3 py-8 lg:py-4 text-center text-gray-500 italic">No data available for this date</div>
        </div>

        <!-- Update and Delete Buttons -->
        <div class="mt-6 lg:mt-4 grid grid-cols-2 gap-4 lg:gap-2">
            <button class="py-4 lg:py-2 text-lg lg:text-base font-bold text-white rounded hover:opacity-90 active:opacity-80 transition-colors bg-[#6ad1e3]" data-action="update-data">Update</button>
            <button class="py-4 lg:py-2 text-lg lg:text-base font-bold text-white rounded hover:opacity-90 active:opacity-80 transition-colors bg-red-500" data-action="delete-data">Delete</button>
        </div>
    </div>
</div>
