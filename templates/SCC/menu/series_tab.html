<div class="series-tab-layout">
    <!-- Vertical Sub-Tab Menu -->
    <div class="series-subtabs" id="series-tab-container">
        <button class="series-subtab active" data-series-tab="corrects">Correct</button>
        <button class="series-subtab" data-series-tab="errors">Incorrect</button>
        <button class="series-subtab" data-series-tab="timing">Timing</button>
        <!-- Dynamic misc series tabs will be inserted here -->
        <button class="series-subtab flex justify-center" data-action="add-misc-series" title="Add new data series">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>
    </div>

    <!-- Series Content Area -->
    <div class="series-content">
        <!-- Correct Trace Config -->
        <div id="corrects-series-config" class="series-config-panel relative">
            <div id="corrects-blocks-container" class="space-y-4 mb-4">
                <div class="agg-config-block relative" data-series="corrects" data-agg="raw">
                    <button class="remove-block-btn absolute top-2 right-2 w-8 h-8 bg-red-500 text-white rounded-full hover:bg-red-600 flex items-center justify-center font-bold text-lg" title="Remove this block">−</button>

                    <div class="space-y-3">
                        <div>
                            <label class="block text-sm font-semibold text-gray-600 mb-1">Series Name</label>
                            <input type="text" class="series-name-input w-full px-3 py-2 border-2 border-gray-300 rounded focus:outline-none" value="correct">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-600 mb-1">Aggregation Type</label>
                            <select class="agg-type-select w-full px-3 py-2 border-2 border-gray-300 rounded focus:outline-none">
                                <option value="raw" selected>Raw</option>
                                <option value="mean">Mean</option>
                                <option value="median">Median</option>
                                <option value="min">Min</option>
                                <option value="max">Max</option>
                                <option value="first">First</option>
                                <option value="last">Last</option>
                                <option value="sum" class="sum-option">Sum</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-600 mb-1">Marker Size</label>
                            <input type="number" class="marker-size-input w-full px-3 py-2 border-2 border-gray-300 rounded focus:outline-none" value="8" min="1" max="50">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-600 mb-1">Line Width</label>
                            <input type="number" class="line-width-input w-full px-3 py-2 border-2 border-gray-300 rounded focus:outline-none" value="0.7" step="0.1" min="0" max="10">
                        </div>
                        <div class="flex items-center justify-between">
                            <label class="text-sm font-semibold text-gray-600">Connecting lines</label>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" class="show-line-input sr-only peer" checked data-series-toggle="corrects">
                                <div class="w-11 h-6 bg-gray-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-[#6ad1e3]"></div>
                            </label>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-600 mb-1">Line Color</label>
                            <input type="color" class="line-color-input w-full h-10 px-1 py-1 border-2 border-gray-300 rounded focus:outline-none cursor-pointer" value="#000000">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-600 mb-1">Marker Color</label>
                            <input type="color" class="marker-color-input w-full h-10 px-1 py-1 border-2 border-gray-300 rounded focus:outline-none cursor-pointer" value="#000000">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-600 mb-1">Marker Edge Color</label>
                            <input type="color" class="marker-edge-color-input w-full h-10 px-1 py-1 border-2 border-gray-300 rounded focus:outline-none cursor-pointer" value="#000000">
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex flex-col gap-3">
                <button class="w-full px-6 py-2 bg-[#6ad1e3] text-white font-semibold rounded hover:opacity-90 active:opacity-80 transition-colors" data-action="apply-corrects-trace">Apply</button>
                <button class="w-full px-6 py-2 bg-gray-400 text-white font-semibold rounded hover:opacity-90 active:opacity-80 transition-colors" data-action="reset-trace-corrects">Reset</button>
            </div>

            <button class="add-block-btn sticky bottom-4 left-1/2 -translate-x-1/2 w-10 h-10 bg-[#6ad1e3] text-white rounded-full hover:bg-opacity-90 shadow flex items-center justify-center font-bold text-xl" data-series="corrects" title="Add aggregation block">+</button>
        </div>

        <!-- Incorrect Trace Config -->

                    <div class="space-y-3">

                            <label class="block text-sm font-semibold text-gray-600 mb-1">Series Name</label>

                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-600 mb-1">Aggregation Type</label>
                            <select class="agg-type-select w-full px-3 py-2 border-2 border-gray-300 rounded focus:outline-none">
                                <option value="raw" selected>Raw</option>
                                <option value="mean">Mean</option>
                                <option value="median">Median</option>
                                <option value="min">Min</option>
                                <option value="max">Max</option>
                                <option value="first">First</option>
                                <option value="last">Last</option>
                                <option value="sum" class="sum-option">Sum</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-600 mb-1">Marker Size</label>
                            <input type="number" class="marker-size-input w-full px-3 py-2 border-2 border-gray-300 rounded focus:outline-none" value="20" min="6" max="100">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-600 mb-1">Line Width</label>
                            <input type="number" class="line-width-input w-full px-3 py-2 border-2 border-gray-300 rounded focus:outline-none" value="0.7" step="0.1" min="0" max="10">
                        </div>
                        <div class="flex items-center justify-between">
                            <label class="text-sm font-semibold text-gray-600">Show Line</label>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" class="show-line-input sr-only peer" checked data-series-toggle="errors">
                                <div class="w-11 h-6 bg-gray-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-[#6ad1e3]"></div>
                            </label>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-600 mb-1">Line Color</label>
                            <input type="color" class="line-color-input w-full h-10 px-1 py-1 border-2 border-gray-300 rounded focus:outline-none cursor-pointer" value="#000000">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-600 mb-1">Marker Color</label>
                            <input type="color" class="marker-color-input w-full h-10 px-1 py-1 border-2 border-gray-300 rounded focus:outline-none cursor-pointer" value="#000000">
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex flex-col gap-3">
                <button class="w-full px-6 py-2 bg-[#6ad1e3] text-white font-semibold rounded hover:opacity-90 active:opacity-80 transition-colors" data-action="apply-errors-trace">Apply</button>
                <button class="w-full px-6 py-2 bg-gray-400 text-white font-semibold rounded hover:opacity-90 active:opacity-80 transition-colors" data-action="reset-trace-errors">Reset</button>
            </div>

            <button class="add-block-btn sticky bottom-4 left-1/2 -translate-x-1/2 w-10 h-10 bg-[#6ad1e3] text-white rounded-full hover:bg-opacity-90 shadow flex items-center justify-center font-bold text-xl" data-series="errors" title="Add aggregation block">+</button>
        </div>

        <!-- Timing Trace Config -->
        <div id="timing-series-config" class="series-config-panel relative" style="display: none;">
            <div id="timing-blocks-container" class="space-y-4 mb-4">
                <div class="agg-config-block relative" data-series="timing" data-agg="raw">
                    <button class="remove-block-btn absolute top-2 right-2 w-8 h-8 bg-red-500 text-white rounded-full hover:bg-red-600 flex items-center justify-center font-bold text-lg" title="Remove this block">−</button>

                    <div class="space-y-3">
                        <div>
                            <label class="block text-sm font-semibold text-gray-600 mb-1">Series Name</label>
                            <input type="text" class="series-name-input w-full px-3 py-2 border-2 border-gray-300 rounded focus:outline-none" value="Timing">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-600 mb-1">Aggregation Type</label>
                            <select class="agg-type-select w-full px-3 py-2 border-2 border-gray-300 rounded focus:outline-none">
                                <option value="raw" selected>Raw</option>
                                <option value="mean">Mean</option>
                                <option value="median">Median</option>
                                <option value="min">Min</option>
                                <option value="max">Max</option>
                                <option value="first">First</option>
                                <option value="last">Last</option>
                                <option value="sum" class="sum-option">Sum</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-600 mb-1">Marker Size</label>
                            <input type="number" class="marker-size-input w-full px-3 py-2 border-2 border-gray-300 rounded focus:outline-none" value="30" min="1" max="50">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-600 mb-1">Line Width</label>
                            <input type="number" class="line-width-input w-full px-3 py-2 border-2 border-gray-300 rounded focus:outline-none" value="0.7" step="0.1" min="0" max="10">
                        </div>
                        <div class="flex items-center justify-between">
                            <label class="text-sm font-semibold text-gray-600">Show Line</label>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" class="show-line-input sr-only peer" data-series-toggle="timing">
                                <div class="w-11 h-6 bg-gray-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-[#6ad1e3]"></div>
                            </label>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-600 mb-1">Line Color</label>
                            <input type="color" class="line-color-input w-full h-10 px-1 py-1 border-2 border-gray-300 rounded focus:outline-none cursor-pointer" value="#000000">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-600 mb-1">Marker Color</label>
                            <input type="color" class="marker-color-input w-full h-10 px-1 py-1 border-2 border-gray-300 rounded focus:outline-none cursor-pointer" value="#000000">
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex flex-col gap-3">
                <button class="w-full px-6 py-2 bg-[#6ad1e3] text-white font-semibold rounded hover:opacity-90 active:opacity-80 transition-colors" data-action="apply-timing-trace">Apply</button>
                <button class="w-full px-6 py-2 bg-gray-400 text-white font-semibold rounded hover:opacity-90 active:opacity-80 transition-colors" data-action="reset-trace-timing">Reset</button>
            </div>

            <button class="add-block-btn sticky bottom-4 left-1/2 -translate-x-1/2 w-10 h-10 bg-[#6ad1e3] text-white rounded-full hover:bg-opacity-90 shadow flex items-center justify-center font-bold text-xl" data-series="timing" title="Add aggregation block">+</button>
        </div>

        <!-- Dynamic misc series panels will be inserted here -->
        <div id="misc-panels-container"></div>
    </div><!-- End series-content -->

    <!-- Template for dynamic misc series config panel -->
    <template id="misc-series-template">
        <div class="series-config-panel relative" style="display: none;">
            <div class="space-y-4 mb-4 misc-blocks-container">
                <div class="agg-config-block relative" data-series="misc-template" data-agg="raw">
                    <button class="remove-block-btn absolute top-2 right-2 w-8 h-8 bg-red-500 text-white rounded-full hover:bg-red-600 flex items-center justify-center font-bold text-lg" title="Remove this block">−</button>

                    <div class="space-y-3">
                        <div>
                            <label class="block text-sm font-semibold text-gray-600 mb-1">Series Name</label>
                            <input type="text" class="series-name-input w-full px-3 py-2 border-2 border-gray-300 rounded focus:outline-none" value="">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-600 mb-1">Aggregation Type</label>
                            <select class="agg-type-select w-full px-3 py-2 border-2 border-gray-300 rounded focus:outline-none">
                                <option value="raw" selected>Raw</option>
                                <option value="mean">Mean</option>
                                <option value="median">Median</option>
                                <option value="min">Min</option>
                                <option value="max">Max</option>
                                <option value="first">First</option>
                                <option value="last">Last</option>
                                <option value="sum" class="sum-option">Sum</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-600 mb-1">Marker Symbol</label>
                            <select class="marker-symbol-input w-full px-3 py-2 border-2 border-gray-300 rounded focus:outline-none">
                                <option value="circle">Circle</option>
                                <option value="square">Square</option>
                                <option value="diamond">Diamond</option>
                                <option value="cross">Cross</option>
                                <option value="x">X</option>
                                <option value="triangle-up">Triangle Up</option>
                                <option value="triangle-down">Triangle Down</option>
                                <option value="star">Star</option>
                                <option value="hexagon">Hexagon</option>
                                <option value="pentagon">Pentagon</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-600 mb-1">Marker Size</label>
                            <input type="number" class="marker-size-input w-full px-3 py-2 border-2 border-gray-300 rounded focus:outline-none" value="8" min="1" max="50">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-600 mb-1">Line Width</label>
                            <input type="number" class="line-width-input w-full px-3 py-2 border-2 border-gray-300 rounded focus:outline-none" value="0.7" step="0.1" min="0" max="10">
                        </div>

                            <label class="text-sm font-semibold text-gray-600">Show Line</label>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" class="show-line-input sr-only peer" checked>
                                <div class="w-11 h-6 bg-gray-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-[#6ad1e3]"></div>
                            </label>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-600 mb-1">Line Color</label>
                            <input type="color" class="line-color-input w-full h-10 px-1 py-1 border-2 border-gray-300 rounded focus:outline-none cursor-pointer" value="#000000">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-600 mb-1">Marker Color</label>
                            <input type="color" class="marker-color-input w-full h-10 px-1 py-1 border-2 border-gray-300 rounded focus:outline-none cursor-pointer" value="#FFA500">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-600 mb-1">Marker Edge Color</label>
                            <input type="color" class="marker-edge-color-input w-full h-10 px-1 py-1 border-2 border-gray-300 rounded focus:outline-none cursor-pointer" value="#000000">
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex flex-col gap-3">
                <button class="w-full px-6 py-2 bg-[#6ad1e3] text-white font-semibold rounded hover:opacity-90 active:opacity-80 transition-colors apply-misc-btn">Apply</button>
                <button class="w-full px-6 py-2 bg-gray-400 text-white font-semibold rounded hover:opacity-90 active:opacity-80 transition-colors reset-misc-btn">Reset</button>
                <button class="w-full px-6 py-2 bg-red-500 text-white font-semibold rounded hover:opacity-90 active:opacity-80 transition-colors delete-misc-btn">Delete</button>
            </div>

            <button class="add-block-btn sticky bottom-4 left-1/2 -translate-x-1/2 w-10 h-10 bg-[#6ad1e3] text-white rounded-full hover:bg-opacity-90 shadow flex items-center justify-center font-bold text-xl" title="Add aggregation block">+</button>
        </div>
    </template>
</div>
