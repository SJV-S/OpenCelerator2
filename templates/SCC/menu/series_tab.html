<div class="series-tab-layout">
    <!-- Flat series nav - one row per series+aggregation combo -->
    <div class="series-subtabs" id="series-tab-container">
        <!-- Flat rows are rendered dynamically by traceStyles.js -->
        <div id="series-flat-list"></div>

        <!-- Add new data series button -->
        <button class="series-row add-series-btn" data-action="add-misc-series" title="Add new data series">
            <span class="series-name">Add Series</span>
            <span class="series-icon">
                <svg class="plus-icon always-visible" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </span>
        </button>
    </div>

    <!-- Series Content Area - shows single aggregation config -->
    <div class="series-content">
        <div id="series-config-panel" class="series-config-panel">
            <!-- Single aggregation config block -->
            <div id="agg-config-form" class="space-y-2">
                <div class="flex items-center justify-between">
                    <label class="text-sm font-semibold text-gray-600 shrink-0">Name</label>
                    <input type="text" id="config-series-name" class="w-3/5 px-2 py-1 border-2 border-gray-300 rounded focus:outline-none text-sm">
                </div>

                <!-- Line Section -->
                <div class="text-xs font-semibold text-gray-500 uppercase tracking-wide pt-2 pb-1 border-b border-gray-300">Line</div>
                <div class="flex items-center justify-between">
                    <label class="text-sm font-semibold text-gray-600 shrink-0">Connecting</label>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="config-show-line" class="sr-only peer">
                        <div class="w-11 h-6 bg-gray-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-[#6ad1e3]"></div>
                    </label>
                </div>
                <div class="flex items-center justify-between">
                    <label class="text-sm font-semibold text-gray-600 shrink-0">Style</label>
                    <select id="config-line-dash" class="w-3/5 px-2 py-1 border-2 border-gray-300 rounded focus:outline-none text-sm">
                        <option value="solid">Solid</option>
                        <option value="dash">Dash</option>
                        <option value="dot">Dot</option>
                        <option value="longdash">Long Dash</option>
                        <option value="dashdot">Dash Dot</option>
                        <option value="longdashdot">Long Dash Dot</option>
                    </select>
                </div>
                <div class="flex items-center justify-between">
                    <label class="text-sm font-semibold text-gray-600 shrink-0">Width</label>
                    <input type="number" id="config-line-width" class="w-3/5 px-2 py-1 border-2 border-gray-300 rounded focus:outline-none text-sm" step="0.1" min="0" max="10">
                </div>
                <div class="flex items-center justify-between">
                    <label class="text-sm font-semibold text-gray-600 shrink-0">Color</label>
                    <input type="color" id="config-line-color" class="w-3/5 h-8 px-1 py-1 border-2 border-gray-300 rounded focus:outline-none cursor-pointer">
                </div>

                <!-- Marker Section -->
                <div class="text-xs font-semibold text-gray-500 uppercase tracking-wide pt-2 pb-1 border-b border-gray-300">Marker</div>
                <div id="marker-symbol-row" class="flex items-center justify-between">
                    <label class="text-sm font-semibold text-gray-600 shrink-0">Symbol</label>
                    <select id="config-marker-symbol" class="w-3/5 px-2 py-1 border-2 border-gray-300 rounded focus:outline-none text-sm">
                        <option value="circle">Circle</option>
                        <option value="square">Square</option>
                        <option value="diamond">Diamond</option>
                        <option value="cross">Cross</option>
                        <option value="x">X</option>
                        <option value="triangle-up">Triangle Up</option>
                        <option value="triangle-down">Triangle Down</option>
                        <option value="star">Star</option>
                        <option value="hexagon">Hexagon</option>
                        <option value="pentagon">Pentagon</option>
                    </select>
                </div>
                <div class="flex items-center justify-between">
                    <label class="text-sm font-semibold text-gray-600 shrink-0">Size</label>
                    <input type="number" id="config-marker-size" class="w-3/5 px-2 py-1 border-2 border-gray-300 rounded focus:outline-none text-sm" min="1" max="50">
                </div>
                <div class="flex items-center justify-between">
                    <label class="text-sm font-semibold text-gray-600 shrink-0">Color</label>
                    <input type="color" id="config-marker-color" class="w-3/5 h-8 px-1 py-1 border-2 border-gray-300 rounded focus:outline-none cursor-pointer">
                </div>
                <div id="marker-edge-color-row" class="flex items-center justify-between">
                    <label class="text-sm font-semibold text-gray-600 shrink-0">Edge Color</label>
                    <input type="color" id="config-marker-edge-color" class="w-3/5 h-8 px-1 py-1 border-2 border-gray-300 rounded focus:outline-none cursor-pointer">
                </div>
            </div>

            <!-- Action buttons -->
            <div class="flex flex-col gap-3 mt-6">
                <button id="apply-config-btn" class="w-full px-6 py-2 bg-[#6ad1e3] text-white font-semibold rounded hover:opacity-90 active:opacity-80 transition-colors">Apply</button>
                <button id="reset-config-btn" class="w-full px-6 py-2 bg-gray-400 text-white font-semibold rounded hover:opacity-90 active:opacity-80 transition-colors">Reset</button>
                <button id="remove-series-btn" class="w-full px-6 py-2 text-white font-semibold rounded hover:opacity-90 active:opacity-80 transition-colors" style="display: none;">Remove</button>
            </div>
        </div>
    </div>
</div>
