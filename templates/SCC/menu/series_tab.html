<div class="series-tab-layout">
    <!-- Flat series nav - one row per series+aggregation combo -->
    <div class="series-subtabs" id="series-tab-container">
        <!-- Flat rows are rendered dynamically by traceStyles.js -->
        <div id="series-flat-list"></div>

        <!-- Add new data series button -->
        <button class="series-row add-series-btn" data-action="add-misc-series" title="Add new data series">
            <span class="series-name">Add Series</span>
            <span class="series-icon">
                <svg class="plus-icon always-visible" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </span>
        </button>
    </div>

    <!-- Series Content Area - shows single aggregation config or add-agg panel -->
    <div class="series-content">
        <!-- Add Aggregation panel (shown when a series heading is clicked) -->
        <div id="add-agg-panel" class="series-config-panel" style="display: none;">
            <h2 id="add-agg-series-name" class="text-sm font-bold text-gray-800 mb-4"></h2>
            <div class="space-y-3">
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">Display Name</label>
                    <input type="text" id="heading-series-name" class="w-full px-3 py-2 border-2 border-gray-300 rounded focus:outline-none">
                </div>
                <button id="apply-heading-name-btn" class="w-full px-6 py-2 bg-[#6ad1e3] text-white font-semibold rounded hover:opacity-90 active:opacity-80 transition-colors">Apply</button>
            </div>

            <hr class="border-gray-300 my-6">

            <div class="space-y-3">
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">Per-Position (on X)</label>
                    <select id="on-x-agg-select" class="w-full px-3 py-2 border-2 border-gray-300 rounded focus:outline-none"></select>
                </div>
                <div id="across-x-agg-row">
                    <label class="block text-sm font-semibold text-gray-600 mb-1">Rolling Window (across X)</label>
                    <select id="across-x-agg-select" class="w-full px-3 py-2 border-2 border-gray-300 rounded focus:outline-none"></select>
                </div>
                <div id="window-size-row" style="display: none;">
                    <label class="block text-sm font-semibold text-gray-600 mb-1">Window Size</label>
                    <input type="number" id="window-size-input" class="w-full px-3 py-2 border-2 border-gray-300 rounded focus:outline-none" min="2" value="7">
                </div>
                <button id="confirm-add-agg-btn" class="w-full px-6 py-2 bg-gray-700 text-white font-semibold rounded hover:opacity-90 active:opacity-80 transition-colors">Add</button>
            </div>
            <p id="add-agg-empty-msg" class="text-sm text-gray-500 mt-3" style="display: none;"></p>
            <button id="delete-series-btn" class="w-full px-6 py-2 mt-6 bg-red-500 text-white font-semibold rounded hover:opacity-90 active:opacity-80 transition-colors" style="display: none;">Delete Series</button>
        </div>

        <div id="series-config-panel" class="series-config-panel">
            <!-- Single aggregation config block -->
            <div id="agg-config-form" class="space-y-3">
                <!-- Line Section -->
                <div class="text-xs font-semibold text-gray-500 uppercase tracking-wide pt-2 pb-1 border-b border-gray-300">Line</div>
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">Style</label>
                    <select id="config-line-dash" class="w-full px-3 py-2 border-2 border-gray-300 rounded focus:outline-none">
                        <option value="none">None</option>
                        <option value="solid">Solid</option>
                        <option value="dash">Dash</option>
                        <option value="dot">Dot</option>
                        <option value="longdash">Long Dash</option>
                        <option value="dashdot">Dash Dot</option>
                        <option value="longdashdot">Long Dash Dot</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">Width</label>
                    <input type="number" id="config-line-width" class="w-full px-3 py-2 border-2 border-gray-300 rounded focus:outline-none" step="0.1" min="0" max="10">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">Color</label>
                    <input type="color" id="config-line-color" class="w-full h-10 px-1 py-1 border-2 border-gray-300 rounded focus:outline-none cursor-pointer">
                </div>

                <!-- Marker Section -->
                <div class="text-xs font-semibold text-gray-500 uppercase tracking-wide pt-2 pb-1 border-b border-gray-300">Marker</div>
                <div id="marker-symbol-row">
                    <label class="block text-sm font-semibold text-gray-600 mb-1">Symbol</label>
                    <select id="config-marker-symbol" class="w-full px-3 py-2 border-2 border-gray-300 rounded focus:outline-none">
                        <option value="none">None</option>
                        <option value="circle">Circle</option>
                        <option value="square">Square</option>
                        <option value="diamond">Diamond</option>
                        <option value="cross">Cross</option>
                        <option value="x">X</option>
                        <option value="triangle-up">Triangle Up</option>
                        <option value="triangle-down">Triangle Down</option>
                        <option value="star">Star</option>
                        <option value="hexagon">Hexagon</option>
                        <option value="pentagon">Pentagon</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">Size</label>
                    <input type="number" id="config-marker-size" class="w-full px-3 py-2 border-2 border-gray-300 rounded focus:outline-none" min="1" max="50">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">Color</label>
                    <input type="color" id="config-marker-color" class="w-full h-10 px-1 py-1 border-2 border-gray-300 rounded focus:outline-none cursor-pointer">
                </div>
                <div id="marker-edge-color-row">
                    <label class="block text-sm font-semibold text-gray-600 mb-1">Edge Color</label>
                    <input type="color" id="config-marker-edge-color" class="w-full h-10 px-1 py-1 border-2 border-gray-300 rounded focus:outline-none cursor-pointer">
                </div>

                <div class="border-b border-gray-300 mt-4 mb-2"></div>
            </div>

            <!-- Action buttons -->
            <div class="flex flex-col gap-3 mt-4">
                <button id="apply-config-btn" class="w-full px-6 py-2 bg-[#6ad1e3] text-white font-semibold rounded hover:opacity-90 active:opacity-80 transition-colors">Apply</button>
                <button id="reset-config-btn" class="w-full px-6 py-2 bg-gray-400 text-white font-semibold rounded hover:opacity-90 active:opacity-80 transition-colors">Reset</button>
                <button id="remove-series-btn" class="w-full px-6 py-2 text-white font-semibold rounded hover:opacity-90 active:opacity-80 transition-colors" style="display: none;">Remove</button>
            </div>
        </div>
    </div>
</div>
