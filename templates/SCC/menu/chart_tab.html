<div class="chart-menu-tab-inner">
    <!-- Chart Name Section -->
    <div class="mb-8 lg:mb-4">
        <label class="block text-sm font-semibold text-gray-600 mb-2 lg:mb-1 text-center" for="chart-name">Chart Name</label>
        <div class="flex items-center gap-2 max-w-md lg:max-w-full mx-auto">
            <input type="text" id="chart-name" placeholder="Unnamed" class="flex-1 px-4 py-3 lg:px-2 lg:py-2 text-lg lg:text-base border-2 border-gray-300 rounded focus:outline-none focus:border-[#6ad1e3] transition-colors text-center">
        </div>
    </div>

    <!-- Start Date Section -->
    <div class="mb-8 lg:mb-4">
        <label id="start-date-label" class="block text-sm font-semibold text-gray-600 mb-2 lg:mb-1 text-center">Start Date</label>

        <!-- Grouped container with border -->
        <div class="border-2 border-gray-300 rounded-lg p-4 max-w-md lg:max-w-full mx-auto">
            <!-- Sunday dropdown (Daily only) -->
            <div id="start-sunday-row" class="flex items-center justify-between mb-3" style="display: none;">
                <label class="text-sm text-gray-500">Sunday</label>
                <div class="flex items-center">
                    <button type="button" data-action="start-sunday-dec" class="w-12 h-12 flex items-center justify-center bg-gray-100 hover:bg-gray-200 active:bg-gray-300 rounded-l border-2 border-r-0 border-gray-300 text-2xl font-bold text-gray-600">‹</button>
                    <div id="start-sunday" data-value="" class="w-20 h-12 flex items-center justify-center border-y-2 border-gray-300 text-xl font-medium bg-white"></div>
                    <button type="button" data-action="start-sunday-inc" class="w-12 h-12 flex items-center justify-center bg-gray-100 hover:bg-gray-200 active:bg-gray-300 rounded-r border-2 border-l-0 border-gray-300 text-2xl font-bold text-gray-600">›</button>
                </div>
            </div>

            <!-- Month input (Daily, Weekly) -->
            <div id="start-month-row" class="flex items-center justify-between mb-3" style="display: none;">
                <label class="text-sm text-gray-500">Month</label>
                <div class="flex items-center">
                    <button type="button" data-action="start-month-dec" class="w-12 h-12 flex items-center justify-center bg-gray-100 hover:bg-gray-200 active:bg-gray-300 rounded-l border-2 border-r-0 border-gray-300 text-2xl font-bold text-gray-600">‹</button>
                    <div id="start-month" data-value="" class="w-20 h-12 flex items-center justify-center border-y-2 border-gray-300 text-xl font-medium bg-white"></div>
                    <button type="button" data-action="start-month-inc" class="w-12 h-12 flex items-center justify-center bg-gray-100 hover:bg-gray-200 active:bg-gray-300 rounded-r border-2 border-l-0 border-gray-300 text-2xl font-bold text-gray-600">›</button>
                </div>
            </div>

            <!-- Year input (Daily, Weekly, Monthly) -->
            <div id="start-year-row" class="flex items-center justify-between mb-3" style="display: none;">
                <label class="text-sm text-gray-500">Year</label>
                <div class="flex items-center">
                    <button type="button" data-action="start-year-dec" class="w-12 h-12 flex items-center justify-center bg-gray-100 hover:bg-gray-200 active:bg-gray-300 rounded-l border-2 border-r-0 border-gray-300 text-2xl font-bold text-gray-600">‹</button>
                    <div id="start-year" data-value="" class="w-20 h-12 flex items-center justify-center border-y-2 border-gray-300 text-xl font-medium bg-white"></div>
                    <button type="button" data-action="start-year-inc" class="w-12 h-12 flex items-center justify-center bg-gray-100 hover:bg-gray-200 active:bg-gray-300 rounded-r border-2 border-l-0 border-gray-300 text-2xl font-bold text-gray-600">›</button>
                </div>
            </div>

            <!-- Decade input (Yearly only) -->
            <div id="start-decade-row" class="flex items-center justify-between" style="display: none;">
                <label class="text-sm text-gray-500">Decade</label>
                <div class="flex items-center">
                    <button type="button" data-action="start-decade-dec" class="w-12 h-12 flex items-center justify-center bg-gray-100 hover:bg-gray-200 active:bg-gray-300 rounded-l border-2 border-r-0 border-gray-300 text-2xl font-bold text-gray-600">‹</button>
                    <div id="start-decade" data-value="" class="w-20 h-12 flex items-center justify-center border-y-2 border-gray-300 text-xl font-medium bg-white"></div>
                    <button type="button" data-action="start-decade-inc" class="w-12 h-12 flex items-center justify-center bg-gray-100 hover:bg-gray-200 active:bg-gray-300 rounded-r border-2 border-l-0 border-gray-300 text-2xl font-bold text-gray-600">›</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Legend Toggle -->
    <div class="mb-8 lg:mb-4">
        <label class="block text-sm font-semibold text-gray-600 mb-2 lg:mb-1 text-center">Legend</label>
        <div class="flex items-center justify-center gap-4 lg:gap-3">
            <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" id="legend-toggle" class="sr-only peer" checked>
                <div class="w-11 h-6 bg-gray-300 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-[#6ad1e3]"></div>
            </label>
            <select id="legend-position" class="px-3 py-2 lg:px-2 lg:py-1 text-sm border-2 border-gray-300 rounded focus:outline-none focus:border-[#6ad1e3] transition-colors bg-white disabled:bg-gray-100 disabled:text-gray-400 disabled:border-gray-200 disabled:cursor-not-allowed">
                <option value="top-right">Top Right</option>
                <option value="top-left">Top Left</option>
                <option value="bottom-right">Bottom Right</option>
                <option value="bottom-left">Bottom Left</option>
            </select>
        </div>
    </div>

    <!-- Chart Capacity -->
    <div class="mb-8 lg:mb-4">
        <label class="block text-sm font-semibold text-gray-600 mb-2 lg:mb-1 text-center" for="chart-capacity">Chart Capacity</label>
        <div class="flex items-center gap-2 max-w-md lg:max-w-full mx-auto">
            <input type="number" id="chart-capacity" min="1" class="flex-1 px-4 py-3 lg:px-2 lg:py-2 text-lg lg:text-base border-2 border-gray-300 rounded focus:outline-none focus:border-[#6ad1e3] transition-colors text-center">
        </div>
    </div>

    <!-- Chart Window -->
    <div class="mb-8 lg:mb-4">
        <label class="block text-sm font-semibold text-gray-600 mb-2 lg:mb-1 text-center" for="chart-window">Chart Window</label>
        <div class="flex items-center gap-2 max-w-md lg:max-w-full mx-auto">
            <input type="number" id="chart-window" min="1" class="flex-1 px-4 py-3 lg:px-2 lg:py-2 text-lg lg:text-base border-2 border-gray-300 rounded focus:outline-none focus:border-[#6ad1e3] transition-colors text-center">
        </div>
    </div>
</div>
