            </div>
            <div>
                <label class="block text-xs sm:text-sm font-semibold text-gray-600 mb-1 sm:mb-2" for="performer">PERFORMER:</label>
                <input type="text" id="performer" class="w-full px-2 py-2 sm:px-3 sm:py-2 md:px-4 md:py-3 text-sm sm:text-base md:text-lg border-2 border-gray-300 rounded focus:outline-none  transition-colors" placeholder="">

        </div>

        <div class="grid grid-cols-2 gap-3 sm:gap-4">
            <div>
                <label class="block text-xs sm:text-sm font-semibold text-gray-600 mb-1 sm:mb-2" for="timer">TIMER:</label>

            <div>
                <label class="block text-xs sm:text-sm font-semibold text-gray-600 mb-1 sm:mb-2" for="counted">COUNTED:</label>
                <input type="text" id="counted" class="w-full px-2 py-2 sm:px-3 sm:py-2 md:px-4 md:py-3 text-sm sm:text-base md:text-lg border-2 border-gray-300 rounded focus:outline-none  transition-colors" placeholder="">

        </div>

        <div class="grid grid-cols-2 gap-3 sm:gap-4">
            <div>
                <label class="block text-xs sm:text-sm font-semibold text-gray-600 mb-1 sm:mb-2" for="advisor">ADVISOR:</label>
                <input type="text" id="advisor" class="w-full px-2 py-2 sm:px-3 sm:py-2 md:px-4 md:py-3 text-sm sm:text-base md:text-lg border-2 border-gray-300 rounded focus:outline-none  transition-colors" placeholder="">

            <div>

            <div>
