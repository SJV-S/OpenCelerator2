<div class="p-4 sm:p-6 w-full max-w-md mx-auto">
    <!-- Vertical Stack of Categories -->
    <div class="flex flex-col gap-10 sm:gap-12">

        <!-- Phase Category -->
        <div class="flex flex-col items-center">
            <h2 class="text-base sm:text-lg font-semibold mb-3 text-center text-gray-800">Phase</h2>
            <div class="flex gap-3 sm:gap-4 justify-center">
                <!-- Phase Text Top Button -->
                <button class="p-3 sm:p-4 border-2 border-gray-300 rounded-lg hover:bg-gray-50 active:bg-gray-100 transition-colors flex items-center justify-center" data-action="phase-text-top" data-icon="phaseTextTop">
                </button>

                <!-- Phase Text Bottom Button -->
                <button class="p-3 sm:p-4 border-2 border-gray-300 rounded-lg hover:bg-gray-50 active:bg-gray-100 transition-colors flex items-center justify-center" data-action="phase-text-bottom" data-icon="phaseTextBottom">
                </button>
            </div>
        </div>

        <!-- Aim Category -->
        <div class="flex flex-col items-center">
            <h2 class="text-base sm:text-lg font-semibold mb-3 text-center text-gray-800">Aim</h2>
            <div class="flex gap-3 sm:gap-4 justify-center">
                <!-- Diagonal Line Button -->
                <button class="p-3 sm:p-4 border-2 border-gray-300 rounded-lg hover:bg-gray-50 active:bg-gray-100 transition-colors flex items-center justify-center" data-action="aim-diagonal" data-icon="aimDiagonal">
                </button>

                <!-- Horizontal Line Button -->
                <button class="p-3 sm:p-4 border-2 border-gray-300 rounded-lg hover:bg-gray-50 active:bg-gray-100 transition-colors flex items-center justify-center" data-action="aim-horizontal" data-icon="aimHorizontal">
                </button>
            </div>
        </div>

        <!-- Lines Section -->
        <div class="flex gap-6 sm:gap-8 justify-center items-start">
            <!-- Cut Series Line -->
            <div class="flex flex-col items-center">
                <h2 class="text-base sm:text-lg font-semibold mb-3 text-center text-gray-800">Cut series line</h2>
                <button class="p-3 sm:p-4 border-2 border-gray-300 rounded-lg hover:bg-gray-50 active:bg-gray-100 transition-colors flex items-center justify-center" data-action="other-scissors" data-icon="otherScissors">
                </button>
            </div>

            <!-- Add Change Line -->
            <div class="flex flex-col items-center">
                <h2 class="text-base sm:text-lg font-semibold mb-3 text-center text-gray-800">Add change line</h2>
                <button class="p-3 sm:p-4 border-2 border-gray-300 rounded-lg hover:bg-gray-50 active:bg-gray-100 transition-colors flex items-center justify-center" data-action="other-celeration" data-icon="otherCeleration">
                </button>
            </div>
        </div>

    </div>
</div>
