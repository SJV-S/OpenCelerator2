<div class="p-4 sm:p-6 lg:p-1 w-full max-w-sm lg:max-w-none mx-auto lg:mx-0">
    <div class="mb-6 lg:mb-3">
        <label class="block text-sm font-semibold text-gray-600 mb-2 lg:mb-1 text-center" for="entry-date">Plot Date</label>
        <div class="flex items-center gap-2">
            <button type="button" data-action="adjust-date" data-offset="-1" class="px-3 py-3 lg:px-2 lg:py-2 text-lg font-bold text-black border-2 border-gray-300 rounded hover:bg-gray-100 active:bg-gray-200 transition-colors flex items-center justify-center">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 4L6 10L12 16" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <input type="date" id="entry-date" class="flex-1 px-3 py-3 lg:px-2 lg:py-2 text-lg lg:text-base border-2 border-gray-300 rounded focus:outline-none transition-colors date-centered text-center">
            <button type="button" data-action="adjust-date" data-offset="1" class="px-3 py-3 lg:px-2 lg:py-2 text-lg font-bold text-black border-2 border-gray-300 rounded hover:bg-gray-100 active:bg-gray-200 transition-colors flex items-center justify-center">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M8 4L14 10L8 16" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>
    </div>

    <div class="mb-6 lg:mb-3 grid grid-cols-2 gap-4 lg:gap-2">
        <div>
            <label id="correct-series-label" class="block text-sm font-semibold text-gray-600 mb-2 lg:mb-1 text-center" for="corrects">Corrects</label>
            <input type="text" inputmode="numeric" pattern="[0-9]*" id="corrects" class="w-full px-3 py-3 lg:px-2 lg:py-2 text-lg lg:text-base border-2 border-gray-300 rounded focus:outline-none transition-colors text-center" placeholder="" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
        </div>
        <div>
            <label id="incorrect-series-label" class="block text-sm font-semibold text-gray-600 mb-2 lg:mb-1 text-center" for="incorrects">Incorrects</label>
            <input type="text" inputmode="numeric" pattern="[0-9]*" id="incorrects" class="w-full px-3 py-3 lg:px-2 lg:py-2 text-lg lg:text-base border-2 border-gray-300 rounded focus:outline-none transition-colors text-center" placeholder="" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
        </div>
    </div>

    <!-- Dynamic misc series inputs - generated by dataEntry.js -->
    <div id="misc-inputs-container" class="mb-6 lg:mb-3 grid grid-cols-2 gap-4 lg:gap-2"></div>

    <div class="mb-6 lg:mb-3">
        <label id="timing-series-label" class="block text-sm font-semibold text-gray-600 mb-2 lg:mb-1 text-center">Timing</label>
        <div class="grid grid-cols-3 gap-4 lg:gap-2">
            <div>
                <label class="block text-xs text-gray-500 mb-1 text-center" for="hours">Hour</label>
                <input type="text" inputmode="numeric" pattern="[0-9]*" id="hours" class="w-full px-2 py-3 lg:py-2 text-lg lg:text-base border-2 border-gray-300 rounded focus:outline-none transition-colors text-center" placeholder="" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
            </div>
            <div>
                <label class="block text-xs text-gray-500 mb-1 text-center" for="minutes">Min</label>
                <input type="text" inputmode="numeric" pattern="[0-9]*" id="minutes" class="w-full px-2 py-3 lg:py-2 text-lg lg:text-base border-2 border-gray-300 rounded focus:outline-none transition-colors text-center" placeholder="" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
            </div>
            <div>
                <label class="block text-xs text-gray-500 mb-1 text-center" for="seconds">Sec</label>
                <input type="text" inputmode="numeric" pattern="[0-9]*" id="seconds" class="w-full px-2 py-3 lg:py-2 text-lg lg:text-base border-2 border-gray-300 rounded focus:outline-none transition-colors text-center" placeholder="" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
            </div>
        </div>
    </div>

    <div class="mt-3 lg:mt-2">
        <button class="w-full py-4 lg:py-2 text-lg lg:text-base font-bold text-white rounded hover:opacity-90 active:opacity-80 transition-colors bg-[#6ad1e3]" data-action="submit-entry">Submit</button>
    </div>
</div>
