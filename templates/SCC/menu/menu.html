<!-- Menu overlay -->
<div id="counter-overlay" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: white; z-index: 1000; display: none; flex-direction: row;">
    <!-- Tabs (Left Sidebar) -->
    <div class="flex flex-col border-r border-gray-300 bg-white">
        <button class="tab-button px-4 py-3 text-base font-semibold text-gray-700 border-l-4 border-[#6ad1e3] bg-gray-50 text-left whitespace-nowrap" data-tab="counter">Counter</button>
        <button class="tab-button px-4 py-3 text-base font-semibold text-gray-700 border-l-4 border-transparent hover:bg-gray-50 text-left whitespace-nowrap" data-tab="data">Data</button>
        <button class="tab-button px-4 py-3 text-base font-semibold text-gray-700 border-l-4 border-transparent hover:bg-gray-50 text-left whitespace-nowrap" data-tab="credit">Credit</button>
        <button class="tab-button px-4 py-3 text-base font-semibold text-gray-700 border-l-4 border-transparent hover:bg-gray-50 text-left whitespace-nowrap" data-tab="lines">Lines</button>
        <button class="tab-button px-4 py-3 text-base font-semibold text-gray-700 border-l-4 border-transparent hover:bg-gray-50 text-left whitespace-nowrap" data-tab="series">Series</button>
        <button class="tab-button px-4 py-3 text-base font-semibold text-gray-700 border-l-4 border-transparent hover:bg-gray-50 text-left whitespace-nowrap" data-tab="chart">Chart</button>
        <button class="tab-button px-4 py-3 text-base font-semibold text-gray-700 border-l-4 border-transparent hover:bg-gray-50 text-left whitespace-nowrap" data-tab="share">Share</button>
    </div>

    <!-- Tab Content -->
    <div class="flex-1 overflow-y-auto overflow-x-hidden">
        <div id="counter-content" class="tab-content flex justify-center items-start min-h-full py-4">
            {% include 'SCC/menu/counter_tab.html' %}
        </div>
        <div id="data-content" class="tab-content flex justify-center items-start min-h-full py-4" style="display: none;">
            {% include 'SCC/menu/data_tab.html' %}
        </div>
        <div id="credit-content" class="tab-content flex justify-center items-start min-h-full py-4" style="display: none;">
            {% include 'SCC/menu/credit_tab.html' %}
        </div>
        <div id="lines-content" class="tab-content flex justify-center items-center min-h-full" style="display: none;">
            {% include 'SCC/menu/lines_tab.html' %}
        </div>
        <div id="series-content" class="tab-content flex justify-center items-start min-h-full py-4" style="display: none;">
            {% include 'SCC/menu/series_tab.html' %}
        </div>
        <div id="chart-content" class="tab-content flex justify-center items-start min-h-full py-4" style="display: none;">
            {% include 'SCC/menu/chart_tab.html' %}
        </div>
        <div id="share-content" class="tab-content flex justify-center items-start min-h-full py-4" style="display: none;">
            {% include 'SCC/menu/share_tab.html' %}
        </div>
    </div>
</div>
