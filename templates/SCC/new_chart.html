<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Chart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chart-btn {
            transition: all 0.15s ease;
        }
        .chart-btn:hover {
            background: #1f2937;
            color: white;
            border-color: #1f2937;
        }
        .chart-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .chart-btn:disabled:hover {
            background: white;
            color: #1f2937;
            border-color: #d1d5db;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #6ad1e3;
            box-shadow: 0 0 0 2px rgba(106, 209, 227, 0.2);
        }
    </style>
</head>
<body class="bg-white min-h-screen">
    <!-- Header -->
    <header class="border-b border-gray-200 bg-white">
        <div class="max-w-4xl mx-auto px-6 py-4 flex items-center justify-between">
            <a href="/" class="text-[#6ad1e3] hover:text-[#5bc4d6] text-sm flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                </svg>
                Back to Charts
            </a>
            <h1 class="text-lg font-semibold text-gray-800">New Chart</h1>
            <div class="w-24"></div>
        </div>
    </header>

    <main class="max-w-md mx-auto px-6 py-12">
        <!-- Chart Name Input -->
        <div class="mb-8">
            <label for="chart-name" class="block text-sm font-medium text-gray-700 mb-2">Chart Name</label>
            <input
                type="text"
                id="chart-name"
                placeholder="Enter chart name..."
                class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg text-lg"
                autocomplete="off"
            >
            <p id="name-error" class="mt-2 text-sm text-red-500 hidden">Please enter a chart name</p>
        </div>

        <!-- Minute/Count Toggle -->
        <div class="mb-8">
            <div class="flex items-center gap-6 text-sm text-gray-600">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="radio" name="chart-mode" value="minute" checked class="accent-[#6ad1e3]">
                    <span>Minute</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="radio" name="chart-mode" value="count" class="accent-[#6ad1e3]">
                    <span>Count</span>
                </label>
            </div>
        </div>

        <!-- Chart Type Buttons -->
        <div class="space-y-3">
            <button class="chart-btn w-full px-6 py-3 border-2 border-gray-300 rounded-lg text-gray-800 bg-white font-medium" data-type="Daily">Daily</button>
            <button class="chart-btn w-full px-6 py-3 border-2 border-gray-300 rounded-lg text-gray-800 bg-white font-medium" data-type="Weekly">Weekly</button>
            <button class="chart-btn w-full px-6 py-3 border-2 border-gray-300 rounded-lg text-gray-800 bg-white font-medium" data-type="Monthly">Monthly</button>
            <button class="chart-btn w-full px-6 py-3 border-2 border-gray-300 rounded-lg text-gray-800 bg-white font-medium" data-type="Yearly">Yearly</button>
            <button class="chart-btn w-full px-6 py-3 border-2 border-gray-300 rounded-lg text-gray-800 bg-white font-medium" data-type="Timing">Timing</button>
            <button class="chart-btn w-full px-6 py-3 border-2 border-gray-300 rounded-lg text-gray-800 bg-white font-medium" data-type="FrequencyCollections">Frequency Collections</button>
        </div>
    </main>

    <script type="module">
        import { initStorage, createChart } from '/static/SCC/storage/chartStorage.js';

        await initStorage();

        const nameInput = document.getElementById('chart-name');
        const nameError = document.getElementById('name-error');
        const buttons = document.querySelectorAll('.chart-btn');

        // Enable/disable buttons based on name input
        function updateButtonState() {
            const hasName = nameInput.value.trim().length > 0;
            buttons.forEach(btn => {
                btn.disabled = !hasName;
            });
            if (hasName) {
                nameError.classList.add('hidden');
            }
        }

        nameInput.addEventListener('input', updateButtonState);
        updateButtonState();

        // Handle chart creation
        buttons.forEach(btn => {
            btn.addEventListener('click', async () => {
                const name = nameInput.value.trim();
                if (!name) {
                    nameError.classList.remove('hidden');
                    nameInput.focus();
                    return;
                }

                const chartType = btn.dataset.type;
                const minuteChart = document.querySelector('input[name="chart-mode"]:checked').value === 'minute';

                const id = await createChart(name, chartType, minuteChart);
                if (id) {
                    window.location.href = `/chart/${id}`;
                }
            });
        });

        // Focus name input on load
        nameInput.focus();
    </script>
</body>
</html>
