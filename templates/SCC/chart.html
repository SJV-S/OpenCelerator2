{% extends "SCC/base.html" %}

{% block title %}{{ chart_type }} Chart{% endblock %}

{% block content %}
    <!-- Chart area wrapper - shifts right on desktop for menu -->
    <div id="chart-area">
        <!-- Chart container: holds the chart (credits rendered as Plotly annotations in bottom margin) -->
        <div id="chart-container">
            <div id="chart" style="position: relative;">
                <div id="custom-legend" style="display: none;"></div>
            </div>
        </div>
    </div>

    <!-- Menu hint tooltip -->
    <div id="menu-hint" style="
        position: fixed;
        bottom: 10vh;
        left: 50%;
        transform: translateX(-50%);
        display: none;
        flex-direction: column;
        align-items: center;
        opacity: 0;
        transition: opacity 0.3s;
        z-index: 9999;
    ">
        <!-- Up arrow -->
        <svg id="menu-hint-arrow-up" width="24" height="24" viewBox="0 0 24 24" style="filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));">
            <path d="M12 4 L20 12 L16 12 L16 20 L8 20 L8 12 L4 12 Z" fill="white" stroke="black" stroke-width="2"/>
        </svg>
        <!-- Down arrow -->
        <svg id="menu-hint-arrow-down" width="24" height="24" viewBox="0 0 24 24" style="filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); display: none;">
            <path d="M12 20 L20 12 L16 12 L16 4 L8 4 L8 12 L4 12 Z" fill="white" stroke="black" stroke-width="2"/>
        </svg>
        <div style="
            margin-top: 8px;
            background-color: white;
            border: 2px solid black;
            border-radius: 6px;
            padding: 8px 16px;
            font-size: 13px;
            color: #374151;
            font-weight: 500;
            white-space: nowrap;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        " id="menu-hint-text"></div>
    </div>

    <!-- Menu overlay -->
    {% include 'SCC/menu/menu.html' %}
{% endblock %}

{% block scripts %}
    <script type="module">
        import { initializeChart, setupEventListeners } from '/static/SCC/main.js';
        import { initStorage, loadChart } from '/static/SCC/storage/chartStorage.js';

        // Check for load param (chart ID from menu)
        const urlParams = new URLSearchParams(window.location.search);
        const loadId = urlParams.get('load');

        async function init() {
            if (!loadId) {
                // No chart specified - redirect to menu
                window.location.href = '/';
                return;
            }

            await initStorage();

            const success = await loadChart(loadId);
            if (!success) {
                console.warn('Failed to load chart:', loadId);
                window.location.href = '/';
                return;
            }

            // Set up event listeners (chartState now populated)
            setupEventListeners();

            // Initialize chart (templates loaded client-side)
            initializeChart();
        }

        init();
    </script>
{% endblock %}
