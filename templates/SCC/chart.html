{% extends "SCC/base.html" %}

{% block title %}{{ chart_type }} Chart{% endblock %}

{% block content %}
    <!-- Chart area wrapper - shifts right on desktop for menu -->
    <div id="chart-area">
        <!-- Top container: holds the chart (80% on desktop, 100% on mobile) -->
        <div id="chart-container">
            <div id="chart" style="position: relative;">
                <div id="custom-legend" style="display: none;"></div>
            </div>
        </div>
        <!-- Credit container: reserved space (15% on desktop, hidden on mobile) -->
        <div id="credit-container"></div>
    </div>

    <!-- Menu hint tooltip -->
    <div id="menu-hint" style="
        position: fixed;
        bottom: 10vh;
        left: 50%;
        transform: translateX(-50%);
        display: none;
        flex-direction: column;
        align-items: center;
        opacity: 0;
        transition: opacity 0.3s;
        z-index: 9999;
    ">
        <!-- Up arrow -->
        <svg id="menu-hint-arrow-up" width="24" height="24" viewBox="0 0 24 24" style="filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));">
            <path d="M12 4 L20 12 L16 12 L16 20 L8 20 L8 12 L4 12 Z" fill="white" stroke="black" stroke-width="2"/>
        </svg>
        <!-- Down arrow -->
        <svg id="menu-hint-arrow-down" width="24" height="24" viewBox="0 0 24 24" style="filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); display: none;">
            <path d="M12 20 L20 12 L16 12 L16 4 L8 4 L8 12 L4 12 Z" fill="white" stroke="black" stroke-width="2"/>
        </svg>
        <div style="
            margin-top: 8px;
            background-color: white;
            border: 2px solid black;
            border-radius: 6px;
            padding: 8px 16px;
            font-size: 13px;
            color: #374151;
            font-weight: 500;
            white-space: nowrap;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        " id="menu-hint-text"></div>
    </div>

    <!-- Menu overlay -->
    {% include 'SCC/menu/menu.html' %}
{% endblock %}

{% block scripts %}
    <script type="module">
        import { initializeChart } from '/static/SCC/main.js';

        {% if initial_load %}
        // Initial load: redirect with container dimensions
        // Account for menu on desktop (1024px+ screens)
        const menuWidth = window.innerWidth >= 1024 ? Math.max(280, Math.min(window.innerWidth * 0.25, 400)) : 0;
        const width = window.innerWidth - menuWidth;
        const height = window.innerHeight;
        window.location.href = `/chart/{{ chart_type }}/{{ minute_type }}?width=${width}&height=${height}`;
        {% else %}
        // On refresh: reset URL to recapture current dimensions
        const navEntry = performance.getEntriesByType('navigation')[0];
        if (navEntry && navEntry.type === 'reload') {
            window.location.href = '/chart/{{ chart_type }}/{{ minute_type }}';
        } else {
            // Template selected: render chart
            var plotData = {{ plot_json | safe }};
            var chartDiv = document.getElementById('chart');

            // Template variables
            var maxWindowWidth = {{ max_window_width }};

            // Clean URL (remove width/height params)
            history.replaceState(null, '', '/chart/{{ chart_type }}/{{ minute_type }}');

            // Initialize chart with template data
            initializeChart(plotData, maxWindowWidth);
        }
        {% endif %}
    </script>
{% endblock %}
