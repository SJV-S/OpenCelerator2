<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Daily Chart{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>

    <!-- Main ES Module entry point - loads all other modules -->
    <script type="module" src="{{ url_for('static', filename='SCC/main.js') }}"></script>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .date-centered {
            text-align: center;
        }
        .date-centered::-webkit-calendar-picker-indicator {
            display: none;
        }
        .date-centered::-webkit-datetime-edit {
            text-align: center;
        }
        input:focus {
            border-color: #6ad1e3 !important;
        }

        /* Custom Legend Styles */
        #custom-legend {
            position: absolute;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 10px;
            border: 1px solid #ccc;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 4px;
            min-width: 120px;
            z-index: 1000;
            pointer-events: all;
        }

        /* Position variants */
        #custom-legend.legend-top-right {
            top: 10px;
            right: 10px;
        }

        #custom-legend.legend-top-left {
            top: 10px;
            left: 10px;
        }

        #custom-legend.legend-bottom-right {
            bottom: 10px;
            right: 10px;
        }

        #custom-legend.legend-bottom-left {
            bottom: 10px;
            left: 10px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 3px;
            transition: background-color 0.2s;
        }

        .legend-item:hover {
            background-color: rgba(0, 0, 0, 0.05);
        }

        .legend-item-hidden {
            opacity: 0.5;
        }

        .legend-marker {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .legend-label {
            font-size: 14px;
            font-family: Arial, sans-serif;
            user-select: none;
        }

        /* Legend lines section - hidden by default, shows on hover/tap */
        .legend-lines-section {
            display: none;
            flex-direction: column;
            gap: 4px;
        }

        #custom-legend:hover .legend-lines-section,
        #custom-legend.touched .legend-lines-section {
            display: flex;
        }

        /* Desktop sidebar layout */
        @media (min-width: 1024px) {
            #counter-overlay {
                display: flex !important;
                position: fixed !important;
                width: 25vw !important;
                min-width: 280px !important;
                max-width: 400px !important;
                height: 100vh !important;
                box-shadow: 2px 0 8px rgba(0,0,0,0.1);
            }

            /* Scale down all content in tabs */
            #sidebar-content {
                font-size: 12px;
                padding: 0.5rem !important;
            }

            #sidebar-content .tab-content > div {
                padding: 0.5rem !important;
                margin: 0 !important;
                max-width: none !important;
            }

            #sidebar-content input,
            #sidebar-content select {
                font-size: 12px !important;
                padding: 4px 6px !important;
                max-width: 100% !important;
            }

            #sidebar-content button {
                font-size: 12px !important;
                padding: 6px 8px !important;
            }

            #sidebar-content label {
                font-size: 11px !important;
            }

            #sidebar-content h2 {
                font-size: 13px !important;
            }

            /* Scale down icons in lines tab */
            #sidebar-content button[data-icon] svg {
                width: 3rem !important;
                height: 3rem !important;
            }

            #sidebar-content button[data-icon] {
                padding: 0.5rem !important;
            }

            #sidebar-content .grid {
                gap: 4px !important;
            }

            #sidebar-content .mb-6,
            #sidebar-content .mb-8 {
                margin-bottom: 8px !important;
            }

            #sidebar-content .gap-4,
            #sidebar-content .gap-6,
            #sidebar-content .gap-8 {
                gap: 4px !important;
            }

            #chart-area {
                margin-left: max(280px, min(25vw, 400px));
                width: calc(100vw - max(280px, min(25vw, 400px)));
                height: 100vh;
                overflow: hidden;
                display: flex;
                justify-content: center;
                align-items: center;
            }
        }

        /* Mobile: keep overlay behavior */
        @media (max-width: 1023px) {
            #chart-area {
                width: 100vw;
            }
        }

        {% block extra_style %}{% endblock %}
    </style>
</head>
<body>
    {% block content %}{% endblock %}
    {% block scripts %}{% endblock %}
</body>
</html>
