<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Chart Type</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #f5f5f5;
        }
        .menu {
            text-align: center;
        }
        .menu table {
            border-collapse: separate;
            border-spacing: 12px;
        }
        .menu th {
            font-size: 14px;
            color: #666;
            padding-bottom: 8px;
        }
        .menu a {
            display: block;
            padding: 16px 48px;
            font-size: 18px;
            text-decoration: none;
            color: #333;
            background: white;
            border: 2px solid #333;
            border-radius: 4px;
        }
        .menu a:hover {
            background: #333;
            color: white;
        }
        .saved-charts {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid #ccc;
        }
        .saved-charts h3 {
            margin: 0 0 12px 0;
            font-size: 14px;
            color: #666;
        }
        .saved-charts select {
            width: 200px;
            padding: 8px;
            font-size: 16px;
            border: 2px solid #333;
            border-radius: 4px;
        }
        .saved-charts button {
            padding: 8px 16px;
            font-size: 16px;
            border: 2px solid #333;
            border-radius: 4px;
            background: white;
            cursor: pointer;
            margin-left: 8px;
        }
        .saved-charts button:hover {
            background: #333;
            color: white;
        }
    </style>
</head>
<body>
    <div class="menu">
        <table>
            <tr>
                <th>Minute</th>
                <th>Count</th>
            </tr>
            <tr>
                <td><a href="#" data-chart-type="Daily" data-minute="true">Daily</a></td>
                <td><a href="#" data-chart-type="Daily" data-minute="false">Daily</a></td>
            </tr>
            <tr>
                <td><a href="#" data-chart-type="Weekly" data-minute="true">Weekly</a></td>
                <td><a href="#" data-chart-type="Weekly" data-minute="false">Weekly</a></td>
            </tr>
            <tr>
                <td><a href="#" data-chart-type="Monthly" data-minute="true">Monthly</a></td>
                <td><a href="#" data-chart-type="Monthly" data-minute="false">Monthly</a></td>
            </tr>
            <tr>
                <td><a href="#" data-chart-type="Yearly" data-minute="true">Yearly</a></td>
                <td><a href="#" data-chart-type="Yearly" data-minute="false">Yearly</a></td>
            </tr>
            <tr>
                <td><a href="#" data-chart-type="Timing" data-minute="true">Timing</a></td>
                <td><a href="#" data-chart-type="Timing" data-minute="false">Timing</a></td>
            </tr>
            <tr>
                <td><a href="#" data-chart-type="FrequencyCollections" data-minute="true">Frequency Collections</a></td>
                <td><a href="#" data-chart-type="FrequencyCollections" data-minute="false">Frequency Collections</a></td>
            </tr>
        </table>

        <div class="saved-charts">
            <h3>Saved Charts</h3>
            <select id="saved-charts-list">
                <option value="">-- Select a chart --</option>
            </select>
            <button id="load-chart-btn">Load</button>
        </div>
    </div>

    <script type="module">
        import { initStorage, createChart, listCharts } from '/static/SCC/storage/chartStorage.js';

        async function loadSavedCharts() {
            try {
                await initStorage();
                const charts = await listCharts();
                const select = document.getElementById('saved-charts-list');
                select.innerHTML = '';

                for (const chart of charts.sort((a, b) => (a.chartName || '').localeCompare(b.chartName || ''))) {
                    const option = document.createElement('option');
                    option.value = JSON.stringify({ id: chart.id, chartType: chart.chartType, minuteChart: chart.minuteChart });
                    option.textContent = `${chart.chartName} (${chart.chartType})`;
                    select.appendChild(option);
                }
            } catch (e) {
                console.log('No saved charts or DB not initialized');
            }
        }

        document.getElementById('load-chart-btn').addEventListener('click', () => {
            const select = document.getElementById('saved-charts-list');
            if (!select.value) return;

            const { id } = JSON.parse(select.value);
            window.location.href = `/chart/${id}`;
        });

        // New Chart links - prompt for name first
        document.querySelectorAll('.menu table a').forEach(link => {
            link.addEventListener('click', async (e) => {
                e.preventDefault();

                const name = prompt('Enter chart name:');
                if (!name || !name.trim()) return;

                const chartType = link.dataset.chartType;
                const minuteChart = link.dataset.minute === 'true';

                const id = await createChart(name.trim(), chartType, minuteChart);
                if (id) {
                    window.location.href = `/chart/${id}`;
                }
            });
        });

        window.addEventListener('pageshow', loadSavedCharts);
    </script>
</body>
</html>
