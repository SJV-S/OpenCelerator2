<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Chart Type</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #f5f5f5;
        }
        .menu {
            text-align: center;
        }
        .menu table {
            border-collapse: separate;
            border-spacing: 12px;
        }
        .menu th {
            font-size: 14px;
            color: #666;
            padding-bottom: 8px;
        }
        .menu a {
            display: block;
            padding: 16px 48px;
            font-size: 18px;
            text-decoration: none;
            color: #333;
            background: white;
            border: 2px solid #333;
            border-radius: 4px;
        }
        .menu a:hover {
            background: #333;
            color: white;
        }
        .saved-charts {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid #ccc;
        }
        .saved-charts h3 {
            margin: 0 0 12px 0;
            font-size: 14px;
            color: #666;
        }
        .saved-charts select {
            width: 200px;
            padding: 8px;
            font-size: 16px;
            border: 2px solid #333;
            border-radius: 4px;
        }
        .saved-charts button {
            padding: 8px 16px;
            font-size: 16px;
            border: 2px solid #333;
            border-radius: 4px;
            background: white;
            cursor: pointer;
            margin-left: 8px;
        }
        .saved-charts button:hover {
            background: #333;
            color: white;
        }
    </style>
</head>
<body>
    <div class="menu">
        <table>
            <tr>
                <th>Minute</th>
                <th>Count</th>
            </tr>
            <tr>
                <td><a href="/chart/Daily/minute">Daily</a></td>
                <td><a href="/chart/Daily/count">Daily</a></td>
            </tr>
            <tr>
                <td><a href="/chart/Weekly/minute">Weekly</a></td>
                <td><a href="/chart/Weekly/count">Weekly</a></td>
            </tr>
            <tr>
                <td><a href="/chart/Monthly/minute">Monthly</a></td>
                <td><a href="/chart/Monthly/count">Monthly</a></td>
            </tr>
            <tr>
                <td><a href="/chart/Yearly/minute">Yearly</a></td>
                <td><a href="/chart/Yearly/count">Yearly</a></td>
            </tr>
            <tr>
                <td><a href="/chart/Timing/minute">Timing</a></td>
                <td><a href="/chart/Timing/count">Timing</a></td>
            </tr>
            <tr>
                <td><a href="/chart/FrequencyCollections/minute">Frequency Collections</a></td>
                <td><a href="/chart/FrequencyCollections/count">Frequency Collections</a></td>
            </tr>
        </table>

        <div class="saved-charts">
            <h3>Saved Charts</h3>
            <select id="saved-charts-list">
                <option value="">-- Select a chart --</option>
            </select>
            <button id="load-chart-btn">Load</button>
        </div>
    </div>

    <script type="module">
        import { initStorage, createChart, listCharts } from '/static/SCC/storage/chartStorage.js';

        async function loadSavedCharts() {
            try {
                await initStorage();
                const charts = await listCharts();
                const select = document.getElementById('saved-charts-list');

                for (const chart of charts.sort((a, b) => a.chartName.localeCompare(b.chartName))) {
                    const option = document.createElement('option');
                    option.value = JSON.stringify({ id: chart.id, chartType: chart.chartType, minuteChart: chart.minuteChart });
                    option.textContent = `${chart.chartName} (${chart.chartType})`;
                    select.appendChild(option);
                }
            } catch (e) {
                console.log('No saved charts or DB not initialized');
            }
        }

        document.getElementById('load-chart-btn').addEventListener('click', () => {
            const select = document.getElementById('saved-charts-list');
            if (!select.value) return;

            const { id, chartType, minuteChart } = JSON.parse(select.value);
            const minuteType = minuteChart ? 'minute' : 'count';
            window.location.href = `/chart/${chartType}/${minuteType}?load=${id}`;
        });

        // New Chart links - prompt for name first
        document.querySelectorAll('.menu table a').forEach(link => {
            link.addEventListener('click', async (e) => {
                e.preventDefault();

                const name = prompt('Enter chart name:');
                if (!name || !name.trim()) return;

                // Parse chart type and minute type from href
                const href = link.getAttribute('href');
                const match = href.match(/\/chart\/([^/]+)\/(\w+)/);
                if (!match) return;

                const chartType = match[1];
                const minuteChart = match[2] === 'minute';

                const id = await createChart(name.trim(), chartType, minuteChart);
                if (id) {
                    window.location.href = `${href}?load=${id}`;
                }
            });
        });

        loadSavedCharts();
    </script>
</body>
</html>
