<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Chart Type</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #f5f5f5;
        }
        .menu {
            text-align: center;
        }
        .menu table {
            border-collapse: separate;
            border-spacing: 12px;
        }
        .menu th {
            font-size: 14px;
            color: #666;
            padding-bottom: 8px;
        }
        .menu a {
            display: block;
            padding: 16px 48px;
            font-size: 18px;
            text-decoration: none;
            color: #333;
            background: white;
            border: 2px solid #333;
            border-radius: 4px;
        }
        .menu a:hover {
            background: #333;
            color: white;
        }
    </style>
</head>
<body>
    <div class="menu">
        <table>
            <tr>
                <th>Minute</th>
                <th>Count</th>
            </tr>
            <tr>
                <td><a href="/chart/Daily/minute">Daily</a></td>
                <td><a href="/chart/Daily/count">Daily</a></td>
            </tr>
            <tr>
                <td><a href="/chart/Weekly/minute">Weekly</a></td>
                <td><a href="/chart/Weekly/count">Weekly</a></td>
            </tr>
            <tr>
                <td><a href="/chart/Monthly/minute">Monthly</a></td>
                <td><a href="/chart/Monthly/count">Monthly</a></td>
            </tr>
            <tr>
                <td><a href="/chart/Yearly/minute">Yearly</a></td>
                <td><a href="/chart/Yearly/count">Yearly</a></td>
            </tr>
            <tr>
                <td><a href="/chart/Timing/minute">Timing</a></td>
                <td><a href="/chart/Timing/count">Timing</a></td>
            </tr>
            <tr>
                <td><a href="/chart/FrequencyCollections/minute">Frequency Collections</a></td>
                <td><a href="/chart/FrequencyCollections/count">Frequency Collections</a></td>
            </tr>
        </table>
    </div>
</body>
</html>
