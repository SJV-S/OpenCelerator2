<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-eval' 'sha256-eMeLGIkvOXByW95vM0yvYcfrI1dtFqJp8gfdN4GVFaM=' 'sha256-F3vN9izgi//DF+vqN4tNcCAWeKH1UYEls1XApnPB7Oo='; style-src 'self' 'unsafe-inline'">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#05c3de">
    <title>{% block title %}{{ app_name }}{% endblock %}</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <link href="{{ url_for('static', filename='SCC/css/fonts.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='SCC/css/tailwind.css') }}" rel="stylesheet">
    <script>
        // Ensure SCC_Identity DB + credentials store exist before any module scripts.
        // Classic scripts run during parsing; module scripts are deferred.
        // This guarantees the IndexedDB open-with-upgrade is queued first.
        // All identity logic (passphrase, key derivation) lives in init.js.
        (function() {
            var req = indexedDB.open('SCC_Identity', 1);
            req.onupgradeneeded = function(e) {
                var db = e.target.result;
                if (!db.objectStoreNames.contains('credentials')) {
                    db.createObjectStore('credentials');
                }
            };
            req.onsuccess = function(e) { e.target.result.close(); };
        })();
    </script>
    {% block head_scripts %}{% endblock %}
    <style>
        html, body {
            margin: 0;
            padding: 0;
            font-family: "Open Sans", sans-serif;
        }
        input:focus {
            border-color: #6ad1e3 !important;
        }
        .page-fade {
            opacity: 0;
            transition: opacity 150ms ease-in;
        }
        .page-fade.visible {
            opacity: 1;
        }
        {% block base_style %}{% endblock %}
    </style>
    {% block extra_style %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
    {% block content %}{% endblock %}
    {% block scripts %}{% endblock %}
    <script>
        // Tell waiting SW to activate, then reload once it takes control
        function activateWaitingSW(waiting) {
            waiting.postMessage({ type: 'SKIP_WAITING' });
            navigator.serviceWorker.addEventListener('controllerchange', function() {
                location.reload();
            });
        }

        // Service Worker Registration
        if ('serviceWorker' in navigator) {
            if (!location.pathname.startsWith('/welcome')) {
                navigator.serviceWorker.register('/service-worker.js')
                    .then(function(reg) {
                        console.log('[SW] Registered:', reg.scope);
                        if (reg.waiting) { activateWaitingSW(reg.waiting); return; }
                        reg.addEventListener('updatefound', function() {
                            var w = reg.installing;
                            if (!w) return;
                            w.addEventListener('statechange', function() {
                                if (w.state === 'installed' && navigator.serviceWorker.controller) {
                                    activateWaitingSW(w);
                                }
                            });
                        });
                    })
                    .catch(function(err) { console.error('[SW] Registration failed:', err); });
            }
        }

        // Nuclear reset - wipes BIP39 identity, all charts, and localStorage.
        // Clears store contents (not deleteDatabase) because chartStorage.js
        // and init.js hold open connections that block deleteDatabase.
        window.nuke = async function() {
            if (!confirm('This will delete ALL charts, reset your BIP39 passphrase, and clear all local data. Continue?')) {
                console.log('Nuke cancelled');
                return;
            }
            var results = [];
            function clearStore(dbName, storeName, storeOpts) {
                return new Promise(function(resolve) {
                    var req = indexedDB.open(dbName, 1);
                    req.onupgradeneeded = function(e) {
                        var db = e.target.result;
                        if (!db.objectStoreNames.contains(storeName)) {
                            db.createObjectStore(storeName, storeOpts);
                        }
                    };
                    req.onsuccess = function() {
                        var db = req.result;
                        if (!db.objectStoreNames.contains(storeName)) {
                            db.close(); results.push(dbName + ': no store'); resolve(); return;
                        }
                        var tx = db.transaction(storeName, 'readwrite');
                        tx.objectStore(storeName).clear();
                        tx.oncomplete = function() { db.close(); results.push(dbName + ': cleared'); resolve(); };
                        tx.onerror = function() { db.close(); results.push(dbName + ': error'); resolve(); };
                    };
                    req.onerror = function() { results.push(dbName + ': open error'); resolve(); };
                });
            }
            await clearStore('SCC_Charts', 'charts', { keyPath: 'id' });
            await clearStore('SCC_Identity', 'credentials');
            localStorage.clear();
            results.push('localStorage: cleared');
            console.log('[NUKE]', results.join(' | '));
            window.location.href = '/welcome';
        };

    </script>
    <script type="module" src="/static/Server/onlineStatus.js"></script>
    <script src="/static/SCC/pageFade.js"></script>
</body>
</html>
