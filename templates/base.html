<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#05c3de">
    <title>{% block title %}Standard Change Chart{% endblock %}</title>
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <link href="{{ url_for('static', filename='SCC/css/fonts.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='SCC/css/tailwind.css') }}" rel="stylesheet">
    <script>
        // Ensure SCC_Identity DB + credentials store exist before any module scripts.
        // Classic scripts run during parsing; module scripts are deferred.
        // This guarantees the IndexedDB open-with-upgrade is queued first.
        // All identity logic (passphrase, key derivation) lives in init.js.
        (function() {
            var req = indexedDB.open('SCC_Identity', 1);
            req.onupgradeneeded = function(e) {
                var db = e.target.result;
                if (!db.objectStoreNames.contains('credentials')) {
                    db.createObjectStore('credentials');
                }
            };
            req.onsuccess = function(e) { e.target.result.close(); };
        })();
    </script>
    {% block head_scripts %}{% endblock %}
    <style>
        html, body {
            margin: 0;
            padding: 0;
            font-family: "Open Sans", sans-serif;
        }
        input:focus {
            border-color: #6ad1e3 !important;
        }
        .page-fade {
            opacity: 0;
            transition: opacity 150ms ease-in;
        }
        .page-fade.visible {
            opacity: 1;
        }
        {% block base_style %}{% endblock %}
    </style>
    {% block extra_style %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
    {% block content %}{% endblock %}
    {% block scripts %}{% endblock %}
    <script>
        // Service Worker Registration
        if ('serviceWorker' in navigator) {
            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (refreshing) return;
                refreshing = true;
                location.reload();
            });
            navigator.serviceWorker.register('/service-worker.js')
                .then(reg => console.log('[SW] Registered:', reg.scope))
                .catch(err => console.error('[SW] Registration failed:', err));
        }

        // Nuclear reset - wipes BIP39 identity, all charts, and localStorage.
        // A new passphrase will be generated on next page load.
        window.nuke = async function() {
            if (!confirm('This will delete ALL charts, reset your BIP39 passphrase, and clear all local data. Continue?')) {
                console.log('Nuke cancelled');
                return;
            }
            const dbs = ['SCC_Charts', 'SCC_Identity'];
            const results = [];
            for (const name of dbs) {
                try {
                    await new Promise((resolve) => {
                        const openReq = indexedDB.open(name);
                        openReq.onsuccess = () => { openReq.result.close(); resolve(); };
                        openReq.onerror = () => resolve();
                    });
                    await new Promise((resolve, reject) => {
                        const req = indexedDB.deleteDatabase(name);
                        req.onsuccess = () => { results.push(name + ': deleted'); resolve(); };
                        req.onerror = () => { results.push(name + ': error'); reject(req.error); };
                        req.onblocked = () => { results.push(name + ': blocked (close other tabs)'); resolve(); };
                    });
                } catch (e) {
                    results.push(name + ': ' + e.message);
                }
            }
            localStorage.clear();
            results.push('localStorage: cleared');
            console.log('[NUKE]', results.join(' | '));
            location.reload();
        };
    </script>
    <script type="module">
        // Online/Offline status indicator
        import { initOnlineStatus } from '/static/Server/onlineStatus.js';
        initOnlineStatus();
    </script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.querySelectorAll('.page-fade').forEach(el => el.classList.add('visible'));
            }, 100);
        });
    </script>
</body>
</html>
